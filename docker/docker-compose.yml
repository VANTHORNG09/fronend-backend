version: "3.8"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

backend:
  build: 
    context: ../backend  # 👈 Point to where Dockerfile actually lives
    dockerfile: Dockerfile
  ports:
    - "8080:8080"
  depends_on:
    - db
  environment:
    - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/lms
    - SPRING_DATASOURCE_USERNAME=lms
    - SPRING_DATASOURCE_PASSWORD=lms_password
    - JWT_SECRET=dev-secret-key-change-in-prod

volumes:
  pgdata: