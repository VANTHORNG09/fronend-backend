spring.application.name=lms-backend
server.port=8080
server.servlet.context-path=/

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lms}
spring.datasource.username=${DATABASE_USERNAME:lms}
spring.datasource.password=${DATABASE_PASSWORD:lms_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:change-this-development-secret-change-this-development-secret}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:20}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:14}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging.level.org.springframework.security=INFO

